---

- name: Deploy Fitness App (Staging)

  hosts: local

  gather_facts: false

  tasks:

    - name: Stop old staging containers

      command: docker compose -f docker-compose.staging.yml down

      args:
        chdir: "{{ playbook_dir }}/.."

      ignore_errors: yes

    - name: Build and start staging

      command: docker compose -f docker-compose.staging.yml up -d --build

      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Wait for containers to initialize

      pause:
        seconds: 15

    - name: Verify backend
      # Retries generously: on the very first deploy MySQL has to initialize
      # its data directory and run schema.sql, which can take 30-60s. The
      # backend waits for MySQL before listening, so /health won't answer
      # until the database is genuinely ready.

      uri:

        url: http://host.docker.internal:4001/health

        method: GET

        status_code: 200

      register: staging_backend_health

      retries: 12

      delay: 10

      until: staging_backend_health.status == 200

    - name: Verify frontend

      uri:

        url: http://host.docker.internal:4000/pages/login.html

        method: GET

        status_code: 200

      register: staging_frontend_health

      retries: 5

      delay: 5

      until: staging_frontend_health.status == 200

    - name: Display URLs

      debug:

        msg:

          - "Frontend: http://localhost:4000"

          - "Backend: http://localhost:4001"
