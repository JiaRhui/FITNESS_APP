---
- name: Deploy RP Fitness App with Docker Compose
  hosts: local
  connection: local
  gather_facts: false

  tasks:
    - name: Stop existing containers
      shell: docker-compose down || true
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Build and start containers
      shell: docker-compose up -d --build
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Wait for containers to start
      pause:
        seconds: 10

    - name: Verify backend health check
      uri:
        url: "http://fitness-backend:3000/health"
        method: GET
        status_code: 200

    - name: Verify frontend login page
      uri:
        url: "http://fitness-frontend:80/pages/login.html"
        method: GET
        status_code: 200

    - name: Show deployment result
      debug:
        msg:
          - "Frontend running at http://localhost:3000/pages/login.html"
          - "Backend running at http://localhost:3001/health"