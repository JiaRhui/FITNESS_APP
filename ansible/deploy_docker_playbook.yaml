---
- name: Deploy RP Fitness App Production Environment
  hosts: local
  connection: local
  gather_facts: false

  tasks:
    - name: Stop existing production containers
      command: docker compose down
      args:
        chdir: "{{ playbook_dir }}/.."
      failed_when: false

    - name: Build and start production containers
      command: docker compose up -d --build
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Wait for production services to start
      pause:
        seconds: 15

    - name: Verify production backend health
      # Retries generously: on the very first deploy MySQL has to initialize
      # its data directory and run schema.sql, which can take 30-60s. The
      # backend waits for MySQL before listening, so /health won't answer
      # until the database is genuinely ready.
      uri:
        url: "http://host.docker.internal:3001/health"
        method: GET
        status_code: 200
        return_content: true
      register: backend_health
      retries: 12
      delay: 10
      until: backend_health.status == 200

    - name: Verify production frontend login page
      uri:
        url: "http://host.docker.internal:3000/pages/login.html"
        method: GET
        status_code: 200
      register: frontend_health
      retries: 5
      delay: 5
      until: frontend_health.status == 200

    - name: Show production deployment result
      debug:
        msg:
          - "Production frontend: http://localhost:3000/pages/login.html"
          - "Production backend: http://localhost:3001/health"
          - "Production deployment and health verification completed successfully."
