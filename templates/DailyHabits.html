<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Habit Checklist</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="app-body">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="{{ url_for('static', filename='images/rp-logo.png') }}" alt="RP logo">
        <div><strong>RP Fitness</strong><span>Daily Habits</span></div>
      </div>
      <nav class="nav-links">
        <a class="active" href="{{ url_for('daily_checklist') }}">Daily Checklist</a>
        <button onclick="logout()">Logout</button>
      </nav>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <div>
          <span class="eyebrow">Monthly habit tracker</span>
          <h1>Daily Habit Checklist</h1>
          <p>Track your calorie goal and workout each day and watch your monthly progress grow.</p>
        </div>
      </header>
      <div id="habitTrackerRoot"></div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="{{ url_for('static', filename='js/habitTracker.js') }}"></script>
</body>
</html>
